<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — ФармаПлюс</title>
  <meta name="description" content="Подробное описание товара, характеристики, рейтинг и отзывы в интернет-аптеке ФармаПлюс.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header__topbar">
      <div class="container header__topbar-inner">
        <span class="header__contact">📞 +7 (999) 999-99-99</span>
      </div>
    </div>
    <div class="header__main">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">💊</span>
          <span class="header__logo-text">Фарма<span>Плюс</span></span>
        </a>
        <div class="header__actions">
          <a href="cart.html" class="header__cart">
            🛒 <span class="badge header__cart-badge" style="display:none;">0</span>
          </a>
          <button class="header__burger" id="burger-btn">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
    <nav class="header__nav">
      <div class="container header__nav-inner">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="categories.html" class="header__nav-link">Категории</a>
        <a href="catalog.html" class="header__nav-link">Каталог</a>
        <a href="orders.html" class="header__nav-link">История заказов</a>
        <a href="contacts.html" class="header__nav-link">Контакты</a>
      </div>
    </nav>
  </header>

  <main class="page product-page" id="product-container">
    <!-- Rendered by JS -->
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <a href="index.html" class="footer__logo">💊 ФармаПлюс</a>
        <p>© 2026 Все права защищены.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get('id'));
      const product = mockProducts.find(p => p.id === productId);

      const container = document.getElementById('product-container');

        if (!product) {
        document.title = 'Товар не найден — ФармаПлюс';
        container.innerHTML = '<div class="container"><h1>Товар не найден</h1><a href="catalog.html">Назад в каталог</a></div>';
        return;
      }

      document.title = `${product.name} — Купить в ФармаПлюс`;
      const inCart = cart.some(item => item.product.id === product.id);
      const ratingStars = '⭐'.repeat(Math.round(product.rating));
      const saving = product.oldPrice ? product.oldPrice - product.price : 0;

      container.innerHTML = `
        <div class="container">
          <div class="product-page__grid animate-fadeInUp">
            <div class="product-page__image-wrap">
              ${product.oldPrice ? '<span class="product-page__badge product-page__badge--sale">Скидка</span>' : ''}
              ${!product.inStock ? '<span class="product-page__badge product-page__badge--out">Нет в наличии</span>' : ''}
              <img src="${product.image}" alt="${product.name}" class="product-page__image" />
            </div>
            
            <div class="product-page__info">
              <span class="product-page__category">${product.categoryLabel}</span>
              <h1 class="product-page__name">${product.name}</h1>
              
              <div class="product-page__rating">
                ${ratingStars}
                <span class="product-page__rating-score">${product.rating}</span>
                <span class="product-page__reviews">(${product.reviews} отзывов)</span>
              </div>

              <div class="product-page__prices">
                <span class="product-page__price">${product.price} ₽</span>
                ${product.oldPrice ? `<span class="product-page__old-price">${product.oldPrice} ₽</span>` : ''}
                ${saving > 0 ? `<span class="product-page__saving">Вы экономите ${saving} ₽</span>` : ''}
              </div>

              <div class="product-page__actions">
                <button 
                  class="btn btn--lg ${inCart ? 'btn--outline' : 'btn--primary'}" 
                  onclick="addToCart(${product.id})" 
                  ${!product.inStock ? 'disabled' : ''}
                  id="add-to-cart-${product.id}"
                >
                  ${inCart ? '✓ В корзине' : 'Добавить в корзину'}
                </button>
              </div>

              <p class="product-page__desc">${product.description}</p>
              
              <div class="product-page__chars">
                <div class="product-page__chars-title">Характеристики</div>
                <table class="product-page__chars-table">
                  <tr class="product-page__chars-row">
                    <td class="product-page__chars-label">Категория</td>
                    <td class="product-page__chars-value">${product.categoryLabel}</td>
                  </tr>
                  <tr class="product-page__chars-row">
                    <td class="product-page__chars-label">Наличие</td>
                    <td class="product-page__chars-value">
                      ${product.inStock ? '<span class="product-page__in-stock">В наличии</span>' : '<span class="product-page__out-stock">Под заказ</span>'}
                    </td>
                  </tr>
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
