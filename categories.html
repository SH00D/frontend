<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Категории товаров — ФармаПлюс</title>
  <meta name="description" content="Все категории аптечных товаров: от витаминов до средств первой помощи. Удобный поиск и навигация.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header__topbar">
      <div class="container header__topbar-inner">
        <span class="header__contact">📞 +7 (999) 999-99-99</span>
      </div>
    </div>
    <div class="header__main">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">💊</span>
          <span class="header__logo-text">Фарма<span>Плюс</span></span>
        </a>
        <div class="header__actions">
          <a href="cart.html" class="header__cart">
            🛒 <span class="badge header__cart-badge" style="display:none;">0</span>
          </a>
          <button class="header__burger" id="burger-btn">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
    <nav class="header__nav">
      <div class="container header__nav-inner">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="categories.html" class="header__nav-link header__nav-link--active">Категории</a>
        <a href="catalog.html" class="header__nav-link">Каталог</a>
        <a href="orders.html" class="header__nav-link">История заказов</a>
        <a href="contacts.html" class="header__nav-link">Контакты</a>
      </div>
    </nav>
  </header>

  <main class="page categories-page">
    <div class="container">
      <nav class="breadcrumbs">
        <a href="index.html" class="breadcrumbs__link">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <span class="breadcrumbs__item--active">Категории</span>
      </nav>

      <div class="section-header">
        <h1 class="section-title">Категории товаров</h1>
        <p class="section-subtitle">Выберите нужный раздел для быстрого поиска</p>
      </div>

      <div class="categories-grid" id="categories-grid">
        <!-- JS Render -->
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <a href="index.html" class="footer__logo">💊 ФармаПлюс</a>
        <p>© 2026 Все права защищены.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const catGrid = document.getElementById('categories-grid');
      categories.forEach(cat => {
        catGrid.innerHTML += `
          <a href="catalog.html?category=${cat.id}" class="cat-card card animate-fadeInUp" style="--cat-color: ${cat.color}; --cat-bg: ${cat.bg}">
            <div class="cat-card__icon-wrap" style="background: ${cat.bg}">
              <span class="cat-card__icon">${cat.icon}</span>
            </div>
            <div class="cat-card__body">
              <h2 class="cat-card__title">${cat.label}</h2>
              <p class="cat-card__desc">${cat.description}</p>
              <span class="cat-card__link">Смотреть товары →</span>
            </div>
          </a>
        `;
      });
    });
  </script>
</body>
</html>
