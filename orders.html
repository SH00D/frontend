<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>История заказов — ФармаПлюс</title>
  <meta name="description" content="Просмотр ваших прошлых заказов и статусов доставки в интернет-аптеке ФармаПлюс.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .orders-list { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .order-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 24px; animation: 0.4s both fadeInUp; }
    .order-card__header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); padding-bottom: 16px; margin-bottom: 16px; }
    .order-card__id { font-weight: 800; color: var(--color-primary); font-size: 1.1rem; }
    .order-card__date { color: var(--color-text-muted); font-size: 0.9rem; }
    .order-card__status { background: var(--color-primary-light); color: var(--color-primary); padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 700; }
    .order-card__items { display: flex; flex-direction: column; gap: 10px; }
    .order-card__item { display: flex; justify-content: space-between; font-size: 0.95rem; }
    .order-card__footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--color-border); }
    .order-card__total-label { color: var(--color-text-muted); }
    .order-card__total-val { font-weight: 800; font-size: 1.2rem; }
    .orders-empty { text-align: center; padding: 100px 20px; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header__topbar">
      <div class="container header__topbar-inner">
        <span class="header__contact">📞 +7 (999) 999-99-99</span>
      </div>
    </div>
    <div class="header__main">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">💊</span>
          <span class="header__logo-text">Фарма<span>Плюс</span></span>
        </a>
        <div class="header__actions">
          <a href="cart.html" class="header__cart">
            🛒 <span class="badge header__cart-badge" style="display:none;">0</span>
          </a>
          <button class="header__burger" id="burger-btn">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
    <nav class="header__nav">
      <div class="container header__nav-inner">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="categories.html" class="header__nav-link">Категории</a>
        <a href="catalog.html" class="header__nav-link">Каталог</a>
        <a href="orders.html" class="header__nav-link header__nav-link--active">Мои заказы</a>
        <a href="contacts.html" class="header__nav-link">Контакты</a>
      </div>
    </nav>
  </header>

  <main class="page orders-page">
    <div class="container">
      <nav class="breadcrumbs">
        <a href="index.html" class="breadcrumbs__link">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <span class="breadcrumbs__item--active">Мои заказы</span>
      </nav>

      <h1 class="section-title">История заказов</h1>
      
      <div id="orders-container" class="orders-list">
        <!-- JS Render -->
      </div>
    </div>
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <a href="index.html" class="footer__logo">💊 ФармаПлюс</a>
        <p>© 2026 Все права защищены.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('orders-container');
      const orderHistory = JSON.parse(localStorage.getItem('orderHistory') || '[]');

      if (orderHistory.length === 0) {
        container.innerHTML = `
          <div class="orders-empty animate-fadeInUp">
            <h2 class="cart-empty__title">У вас пока нет заказов</h2>
            <p class="cart-empty__desc">Как только вы оформите свой первый заказ, он появится здесь.</p>
            <a href="catalog.html" class="btn btn--primary btn--lg" style="margin-top: 20px;">Перейти в каталог</a>
          </div>
        `;
        return;
      }

      // Reverse to show latest first
      orderHistory.slice().reverse().forEach(order => {
        const date = new Date(order.date).toLocaleString('ru-RU');
        const itemsHtml = order.items.map(item => `
          <div class="order-card__item">
            <span>${item.product.name} × ${item.quantity}</span>
            <span>${item.product.price * item.quantity} ₽</span>
          </div>
        `).join('');

        container.innerHTML += `
          <div class="order-card card">
            <div class="order-card__header">
              <div>
                <span class="order-card__id">Заказ ${order.id}</span>
                <div class="order-card__date">${date}</div>
              </div>
              <span class="order-card__status">Выполнен</span>
            </div>
            <div class="order-card__items">
              ${itemsHtml}
              <div class="order-card__item" style="color: var(--color-text-muted);">
                <span>Доставка</span>
                <span>${order.delivery === 0 ? 'Бесплатно' : order.delivery + ' ₽'}</span>
              </div>
            </div>
            <div class="order-card__footer">
              <span class="order-card__total-label">Общий итог</span>
              <span class="order-card__total-val">${order.total} ₽</span>
            </div>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
