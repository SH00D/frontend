<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог товаров — ФармаПлюс | Лекарства и витамины</title>
  <meta name="description" content="Заказывайте сертифицированные лекарства и БАДы в каталоге ФармаПлюс. Удобные фильтры, сортировка и быстрая доставка.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header__topbar">
      <div class="container header__topbar-inner">
        <span class="header__contact">📞 +7 (999) 999-99-99</span>
      </div>
    </div>
    <div class="header__main">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">💊</span>
          <span class="header__logo-text">Фарма<span>Плюс</span></span>
        </a>
        <form class="header__search" action="catalog.html" method="GET">
          <input class="header__search-input" type="text" name="search" placeholder="Найти лекарство..." id="search-input" />
          <button type="submit" class="header__search-btn">🔍</button>
        </form>
        <div class="header__actions">
          <a href="cart.html" class="header__cart">
            🛒 <span class="badge header__cart-badge" style="display:none;">0</span>
          </a>
          <button class="header__burger" id="burger-btn">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
    <nav class="header__nav">
      <div class="container header__nav-inner">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="categories.html" class="header__nav-link">Категории</a>
        <a href="catalog.html" class="header__nav-link header__nav-link--active">Каталог</a>
        <a href="orders.html" class="header__nav-link">История заказов</a>
        <a href="contacts.html" class="header__nav-link">Контакты</a>
      </div>
    </nav>
  </header>

  <main class="page catalog-page">
    <div class="container">
      <nav class="breadcrumbs">
        <a href="index.html" class="breadcrumbs__link">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <span class="breadcrumbs__item--active">Каталог</span>
      </nav>

      <div class="catalog-page__header">
        <h1 class="section-title">Каталог товаров</h1>
        <span class="catalog-page__count" id="results-count">0 товаров</span>
      </div>
      
      <div class="catalog-page__layout">
        <!-- Sidebar filters -->
        <aside class="catalog-sidebar">
          <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title">Поиск</h3>
            <input type="text" id="filter-search" placeholder="Название товара..." class="form-input catalog-sidebar__search" />
          </div>

          <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title">Категория</h3>
            <div class="catalog-sidebar__cats" id="filter-categories">
              <!-- Rendered by JS -->
            </div>
          </div>

          <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title" id="price-label">Цена до: 2000 ₽</h3>
            <input type="range" min="0" max="3000" value="3000" id="price-range" class="catalog-sidebar__range" />
            <div class="catalog-sidebar__range-labels">
               <span>0 ₽</span><span>3000+ ₽</span>
            </div>
          </div>
        </aside>

        <!-- Main Area -->
        <div class="catalog-main">
          <div class="catalog-main__toolbar">
            <select class="form-input catalog-main__sort" id="sort-select">
              <option value="default">По умолчанию</option>
              <option value="price_asc">Цена: по возрастанию</option>
              <option value="price_desc">Цена: по убыванию</option>
              <option value="name_asc">Название: А–Я</option>
              <option value="rating">По рейтингу</option>
            </select>
          </div>

          <div class="catalog-grid" id="catalog-grid">
            <!-- Rendered by JS -->
          </div>

          <div class="catalog-pagination" id="pagination">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <a href="index.html" class="footer__logo">💊 ФармаПлюс</a>
        <p>© 2026 Все права защищены.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
